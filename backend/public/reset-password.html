<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifre Sıfırlama - Hayvanyeri</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            max-width: 450px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            padding: 5px;
            background: #e8f5e9;
            border-radius: 50%;
        }
        h1 {
            color: #1b1b1b;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            margin: 14px 0 8px 0;
        }
        .subtitle {
            color: #757575;
            text-align: center;
            margin-bottom: 48px;
            font-size: 16px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #424242;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            font-size: 15px;
            background: #fafafa;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border: 2px solid #2e7d32;
            background: white;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 24px;
        }
        .btn:hover {
            background: #1b5e20;
        }
        .btn:disabled {
            background: #bdbdbd;
            cursor: not-allowed;
        }
        .message {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        .message.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }
        .message.show {
            display: block;
        }
        .password-requirements {
            font-size: 13px;
            color: #757575;
            margin-top: 6px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .info-box {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            border-radius: 12px;
            padding: 14px;
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .info-box-icon {
            color: #1976d2;
            font-size: 20px;
        }
        .info-box-text {
            color: #0d47a1;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="/logo.png" alt="Hayvanyeri">
        </div>
        
        <h1>Yeni Şifre Oluştur</h1>
        <p class="subtitle">Lütfen yeni şifrenizi girin</p>

        <div id="message" class="message"></div>

        <form id="resetForm">
            <div class="form-group">
                <label for="password">Yeni Şifre</label>
                <input type="password" id="password" placeholder="En az 6 karakter" required>
                <div class="password-requirements">En az 6 karakter olmalı</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Şifre Tekrar</label>
                <input type="password" id="confirmPassword" placeholder="Şifrenizi tekrar girin" required>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                <span id="btnText">Şifremi Güncelle</span>
                <span id="btnLoading" class="loading" style="display: none;"></span>
            </button>
        </form>

        <div class="info-box">
            <div class="info-box-icon">ℹ️</div>
            <div class="info-box-text">Bağlantı 1 saat geçerlidir</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const form = document.getElementById('resetForm');
        const message = document.getElementById('message');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoading = document.getElementById('btnLoading');

        if (!token) {
            showMessage('Geçersiz bağlantı. Lütfen email adresinizi kontrol edin.', 'error');
            submitBtn.disabled = true;
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (password.length < 6) {
                showMessage('Şifre en az 6 karakter olmalıdır', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Şifreler eşleşmiyor', 'error');
                return;
            }

            submitBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline-block';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        newPassword: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('✓ Şifreniz başarıyla güncellendi! Uygulamadan giriş yapabilirsiniz.', 'success');
                    form.style.display = 'none';
                    setTimeout(() => {
                        window.close();
                    }, 3000);
                } else {
                    showMessage(data.message || 'Bir hata oluştu', 'error');
                    submitBtn.disabled = false;
                    btnText.style.display = 'inline';
                    btnLoading.style.display = 'none';
                }
            } catch (error) {
                showMessage('Bağlantı hatası. Lütfen tekrar deneyin.', 'error');
                submitBtn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            }
        });

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type + ' show';
        }
    </script>
</body>
</html>
